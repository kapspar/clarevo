<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>Insurance — Clarevo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="plan-style.css">
</head>
<body>

<nav class="nav">
  <a href="dashboard.html" class="logo">Clar<span>evo</span></a>
  <div class="nav-right">
    <a href="dashboard.html" class="nav-link hide-mobile">Dashboard</a>
    <a href="learn.html" class="nav-link hide-mobile">Learn</a>
    <button class="signout-btn" onclick="signOut()">Sign out</button>
  </div>
</nav>

<div class="wrap">
  <a href="dashboard.html" class="back-link">← Back to dashboard</a>

  <div class="card">
    <div class="card-head">
      <div class="card-icon">🛡️</div>
      <div class="card-head-text"><h2>Insurance Policies</h2>
        <p>Life, home, auto, disability — every policy and who to call.</p></div>
      <span class="card-badge badge-missing" id="insBadge">Set up</span>
    </div>
    <div id="insList"></div>
    <button class="add-btn" type="button" onclick="ins.addBlank()">+ Add a policy</button>
  </div>
</div>

<div class="save-bar">
  <div class="save-status" id="saveStatus">All changes saved securely to your account.</div>
  <button class="save-btn" id="saveBtn" onclick="saveData()">Save Insurance</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="plan-shared.js"></script>
<script>
  let ins;
  function setBadge(score){
    const el=$('insBadge');
    if(score>=80){ el.textContent='Complete ✓'; el.className='card-badge badge-complete'; }
    else if(score>0){ el.textContent=score+'%'; el.className='card-badge badge-partial'; }
    else { el.textContent='Set up'; el.className='card-badge badge-missing'; }
  }
  requireAuth(() => {
    ins = new ListManager({
      table:'insurance_items', container:'insList',
      emptyText:'No policies added yet.', uploadLabel:'Policy document',
      onChange:()=>setBadge(ins.score()),
      fields:[
        {key:'kind', label:'Type', type:'select', options:['Life','Home / Tenant','Auto','Disability','Critical illness','Other']},
        {key:'insurer', label:'Insurer', placeholder:'e.g. Sun Life, Intact'},
        {key:'policy_number', label:'Policy number', placeholder:'e.g. SL-1234567', weight:0},
        {key:'coverage', label:'Coverage', placeholder:'e.g. Term $500k', weight:0},
        {key:'beneficiary', label:'Beneficiary', placeholder:'e.g. Spouse', weight:0},
        {key:'owner', label:'Owner', type:'select', options:['Me','Spouse','Joint']},
        {key:'contact_name', label:'Advisor / agent', placeholder:'e.g. Jane Smith', weight:0},
        {key:'claims_phone', label:'Claims phone', placeholder:'e.g. 1-800-555-0199', weight:0}
      ]
    });
    ins.load().then(()=>setBadge(ins.score()));
  });
  async function saveData(){
    const s=saving('saveBtn','saveStatus','Save Insurance');
    try { await ins.saveAll(); setBadge(ins.score()); s.done(); }
    catch(err){ s.fail(err); }
  }
</script>
</body>
</html>
