<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property — Clarevo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="plan-style.css">
</head>
<body>

<nav class="nav">
  <a href="dashboard.html" class="logo">Clar<span>evo</span></a>
  <div class="nav-right">
    <a href="dashboard.html" class="nav-link hide-mobile">Dashboard</a>
    <a href="learn.html" class="nav-link hide-mobile">Learn</a>
    <button class="signout-btn" onclick="signOut()">Sign out</button>
  </div>
</nav>

<div class="wrap">
  <a href="dashboard.html" class="back-link">← Back to dashboard</a>

  <div class="card">
    <div class="card-head">
      <div class="card-icon">🏠</div>
      <div class="card-head-text"><h2>Properties</h2>
        <p>Primary home, cottage, rentals, land — every property you own or rent.</p></div>
      <span class="card-badge badge-missing" id="propBadge">Set up</span>
    </div>
    <div id="propList"></div>
    <button class="add-btn" type="button" onclick="prop.addBlank()">+ Add a property</button>
  </div>
</div>

<div class="save-bar">
  <div class="save-status" id="saveStatus">All changes saved securely to your account.</div>
  <button class="save-btn" id="saveBtn" onclick="saveData()">Save Properties</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="plan-shared.js"></script>
<script>
  let prop;
  function setBadge(score){
    const el=$('propBadge');
    if(score>=80){ el.textContent='Complete ✓'; el.className='card-badge badge-complete'; }
    else if(score>0){ el.textContent=score+'%'; el.className='card-badge badge-partial'; }
    else { el.textContent='Set up'; el.className='card-badge badge-missing'; }
  }
  requireAuth(() => {
    prop = new ListManager({
      table:'property_items', container:'propList',
      emptyText:'No properties added yet.', uploadLabel:'Relevant documents (deed, mortgage, lease)',
      onChange:()=>setBadge(prop.score()),
      fields:[
        {key:'address', label:'Address / name', placeholder:'e.g. 12 Maple St, or "The cottage"'},
        {key:'kind', label:'Type', type:'select', options:['Primary residence','Secondary / cottage','Rental','Land']},
        {key:'ownership', label:'Ownership', type:'select', options:['Owned outright','Mortgaged','Rented']},
        {key:'mortgage_lender', label:'Mortgage lender', placeholder:'e.g. Scotiabank (if mortgaged)'},
        {key:'owner', label:'Owner', type:'select', options:['Me','Spouse','Joint']},
        {key:'notes', label:'Notes', full:true, type:'textarea', placeholder:'e.g. Property tax auto-pays from joint chequing; spare keys with neighbour'}
      ]
    });
    prop.load().then(()=>setBadge(prop.score()));
  });
  async function saveData(){
    const s=saving('saveBtn','saveStatus','Save Properties');
    try { await prop.saveAll(); setBadge(prop.score()); s.done(); }
    catch(err){ s.fail(err); }
  }
</script>
</body>
</html>
