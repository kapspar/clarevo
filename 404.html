<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clarevo — Page Not Found</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 24px; }
    .logo { font-size: 28px; font-weight: 800; color: var(--dark); text-decoration: none; margin-bottom: 48px; display: block; }
    .logo span { color: var(--blue); }
    .error-code { font-size: 96px; font-weight: 800; color: var(--blue); line-height: 1; margin-bottom: 8px; letter-spacing: -4px; }
    .error-title { font-size: 24px; font-weight: 700; color: var(--dark); margin-bottom: 12px; }
    .error-sub { font-size: 15px; color: var(--gray); max-width: 380px; line-height: 1.6; margin-bottom: 36px; }
    .btn-home { display: inline-block; background: var(--blue); color: white; padding: 14px 28px; border-radius: 10px; font-size: 15px; font-weight: 700; text-decoration: none; font-family: var(--font); }
    .btn-home:hover { background: #2563eb; }
    .secondary-link { display: block; margin-top: 16px; font-size: 14px; color: var(--gray); text-decoration: none; }
    .secondary-link:hover { color: var(--blue); }
  </style>
</head>
<body>
  <a href="home.html" class="logo">Clar<span>evo</span></a>
  <div class="error-code">404</div>
  <div class="error-title">Page not found</div>
  <p class="error-sub">The page you're looking for doesn't exist or may have moved. Let's get you back on track.</p>
  <a href="home.html" class="btn-home">Go to Clarevo Home →</a>
  <a href="dashboard.html" class="secondary-link">Or go to your dashboard →</a>
</body>
</html>
